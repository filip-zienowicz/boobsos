name: build-boobsos-game

# Buduje edycję gamingową BoobsOS-Game i publikuje do ghcr.io.
# Jeden Containerfile — dwa warianty GPU (matrix):
#   mesa  (domyślny): baza silverblue-main  → boobsos-game          (AMD/Intel/nouveau)
#   nvidia:           baza silverblue-nvidia → boobsos-game-nvidia   (NVIDIA)
#
# Wyzwalacze:
#   - push na main zmieniający editions/game/** lub files/ (branding)
#   - schedule: codziennie 06:00 UTC (ublue aktualizuje bazy co noc)
#   - workflow_dispatch: ręczne odpalenie

on:
  push:
    branches: [main]
    paths:
      - "editions/game/**"
      - "files/**"
      - "Containerfile"
  schedule:
    - cron: "0 6 * * *"   # codziennie 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write           # wymagane: wypchnięcie obrazu do ghcr.io

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Wariant mesa: AMD/Intel/nouveau — lekki, domyślny obraz
          - variant: mesa
            base_image: ghcr.io/ublue-os/silverblue-main
            image_name: ghcr.io/${{ github.repository_owner }}/boobsos-game

          # Wariant nvidia: NVIDIA (akmod-nvidia) — ciężki (~8-12 GB)
          - variant: nvidia
            base_image: ghcr.io/ublue-os/silverblue-nvidia
            image_name: ghcr.io/${{ github.repository_owner }}/boobsos-game-nvidia

    steps:
      - uses: actions/checkout@v4

      # Oba obrazy są DUŻE (mesa ~5 GB, nvidia ~8-12 GB) → zwalniamy miejsce na dysku agenta.
      - name: Zwolnij miejsce na dysku
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      # Login do ghcr.io — potrzebny do push; pull baz ublue jest publiczny
      # (bez logowania), ale login zapobiega rate-limitom.
      - name: Login do ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Pull bazowego obrazu ublue przed buildem.
      - name: Pull bazowego obrazu (${{ matrix.variant }})
        run: |
          podman pull "${{ matrix.base_image }}:latest"
          echo "Base image pulled: $(podman inspect --format '{{.Id}}' ${{ matrix.base_image }}:latest | head -c 12)"

      # Build edycji gamingowej z ARG BASE_IMAGE.
      # Context: katalog GŁÓWNY repo — bo Containerfile odwołuje się do files/ (COPY files/ /)
      # oraz do editions/game/files/ (COPY editions/game/files/ /).
      - name: Build obrazu gamingowego — wariant ${{ matrix.variant }}
        run: |
          podman build --format docker \
            -f editions/game/Containerfile \
            --build-arg BASE_IMAGE=${{ matrix.base_image }} \
            -t "${{ matrix.image_name }}:latest" \
            -t "${{ matrix.image_name }}:${GITHUB_SHA::7}" \
            .

      - name: Test obrazu — wariant ${{ matrix.variant }}
        run: bash tests/test-image.sh "${{ matrix.image_name }}:${GITHUB_SHA::7}"

      - name: Push do rejestru (${{ matrix.variant }})
        run: |
          # ghcr bywa flaky przy dużych warstwach (HTTP 500) — retry z backoffem.
          push_retry() {
            for i in 1 2 3 4 5; do
              podman push "$1" && return 0
              echo "::warning::push $1 nieudany (próba $i/5) — ponawiam za $((i*15))s"
              sleep $((i*15))
            done
            return 1
          }
          push_retry "${{ matrix.image_name }}:${GITHUB_SHA::7}"
          push_retry "${{ matrix.image_name }}:latest"
          echo "Opublikowano: ${{ matrix.image_name }}:latest (SHA: ${GITHUB_SHA::7})"

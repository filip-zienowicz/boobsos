name: build-boobsos

# Buduje obraz BoobsOS i publikuje do ghcr.io (publiczny rejestr, darmowy).
# Aktualizacje BoobsOS: użytkownicy ciągną z ghcr.io/filip-zienowicz/boobsos:latest
# (bootc switch / auto-update timer). Codzienny rebuild = świeża baza Fedory.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 5 * * *"   # codziennie 05:00 UTC — świeże pakiety Fedory/UBlue
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write          # pozwala wypchnąć obraz do ghcr przez GITHUB_TOKEN

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/boobsos

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Standardowy runner ma ~14 GB wolne; obraz BoobsOS to ~7-8 GB → robimy miejsce.
      - name: Zwolnij miejsce na dysku
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Build obrazu (buildah/podman)
        run: |
          podman build --format docker \
            -f Containerfile \
            -t "$IMAGE:latest" \
            -t "$IMAGE:${GITHUB_SHA::7}" \
            .

      - name: Login do ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push do rejestru
        run: |
          podman push "$IMAGE:latest"
          podman push "$IMAGE:${GITHUB_SHA::7}"
          echo "Opublikowano: $IMAGE:latest"

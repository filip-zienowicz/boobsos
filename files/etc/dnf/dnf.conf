# see `man dnf.conf` for defaults and possible options
#
# BoobsOS — globalny exclude pakietów Fedory dostarczających "docker".
# Używamy prawdziwego Docker CE z repo Dockera (files/etc/yum.repos.d/docker-ce.repo).
# Pakiety podman-docker / docker-cli / moby-engine dostarczają docker-ce/docker-cli
# i kolidują z docker-ce. Bez tego dnf przy kolejnych transakcjach (np. instalacja
# narzędzi K8s) próbuje wciągnąć podman-docker → konflikt. Wykluczamy je globalnie.

[main]
excludepkgs=podman-docker,docker-cli,moby-engine

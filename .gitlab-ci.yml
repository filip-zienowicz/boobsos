# BoobsOS — GitLab CI/CD
#
# Pipeline:
#   build  — buduje obraz OCI z Containerfile i publikuje do GitLab Container Registry
#   iso    — generuje instalator (anaconda-iso) z obrazu przez bootc-image-builder
#
# RUNNER: self-hosted na fz-vm, docker executor PRIVILEGED (wymagane przez buildah
#   i bootc-image-builder). gitlab.cycr.us używa prywatnego CA — runner ma je w
#   /etc/gitlab-runner/certs, a joby dociągają je z $CI_SERVER_TLS_CA_FILE (before_script).

stages:
  - build
  - iso

variables:
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  IMAGE_SHA: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  STORAGE_DRIVER: overlay
  BUILDAH_ISOLATION: chroot
  BUILDAH_FORMAT: docker

# Wspólny krok: zaufaj prywatnemu CA gitlab.cycr.us w kontenerze joba (Fedora/CentOS)
.trust-ca: &trust-ca
  - |
    if [ -n "$CI_SERVER_TLS_CA_FILE" ] && [ -f "$CI_SERVER_TLS_CA_FILE" ]; then
      cp "$CI_SERVER_TLS_CA_FILE" /etc/pki/ca-trust/source/anchors/gitlab-cycr.crt 2>/dev/null \
        && update-ca-trust 2>/dev/null && echo "==> CA gitlab.cycr.us zaufane" || true
    fi

# ---------------------------------------------------------------------------
# build — obraz OCI → GitLab Container Registry
# ---------------------------------------------------------------------------
build-image:
  stage: build
  image: quay.io/buildah/stable:latest
  before_script:
    - *trust-ca
  script:
    - echo "==> Logowanie do rejestru ${CI_REGISTRY}"
    - buildah login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
    - echo "==> Budowanie obrazu BoobsOS"
    - buildah build --file Containerfile --tag "${IMAGE_LATEST}" --tag "${IMAGE_SHA}" .
    - |
      if [ "${CI_COMMIT_BRANCH}" = "${CI_DEFAULT_BRANCH}" ]; then
        echo "==> main → push obrazu"
        buildah push "${IMAGE_SHA}"
        buildah push "${IMAGE_LATEST}"
      else
        echo "==> ${CI_COMMIT_BRANCH} → tylko build (bez push)"
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

# ---------------------------------------------------------------------------
# iso — instalator (Anaconda) z opublikowanego obrazu
#   Wynik: output/bootiso/*.iso → artefakt. Domyślnie ręcznie (duże/wolne).
# ---------------------------------------------------------------------------
build-iso:
  stage: iso
  image:
    name: quay.io/centos-bootc/bootc-image-builder:latest
    entrypoint: [""]
  before_script:
    - *trust-ca
    - echo "==> Logowanie do rejestru (pull obrazu)"
    - |
      mkdir -p ~/.config/containers
      printf '{"auths":{"%s":{"auth":"%s"}}}' "$CI_REGISTRY" \
        "$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 -w0)" \
        > ~/.config/containers/auth.json
  script:
    - echo "==> Generuję ISO z ${IMAGE_LATEST}"
    - mkdir -p "$(pwd)/output"
    - |
      bootc-image-builder \
        --type anaconda-iso \
        --rootfs ext4 \
        --output "$(pwd)/output" \
        --auth-file ~/.config/containers/auth.json \
        "${IMAGE_LATEST}"
  artifacts:
    name: "boobsos-iso-${CI_COMMIT_SHORT_SHA}"
    paths:
      - output/bootiso/*.iso
    expire_in: 2 weeks
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
    - if: '$CI_COMMIT_TAG'
  needs:
    - build-image

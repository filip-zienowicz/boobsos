# MangoHud — domyślna konfiguracja dla BoobsOS Gaming Edition
# Dokumentacja: https://github.com/flightlessmango/MangoHud#readme
#
# Plik instalowany do /etc/skel/.config/MangoHud/MangoHud.conf
# i kopiowany do katalogu domowego nowego użytkownika przy tworzeniu konta.
# Użytkownik może nadpisać ustawienia własnym plikiem ~/.config/MangoHud/MangoHud.conf

# --- Pozycja i wygląd ---
position=top-left
font_size=20

# --- Kolory marki BoobsOS Gaming (hex bez '#') ---
gpu_color=DC2626
cpu_color=F87171
text_color=FFFFFF
background_color=020202
alpha=0.8

# --- Statystyki GPU ---
gpu_stats
gpu_temp
gpu_mem_clock
gpu_core_clock
vram

# --- Statystyki CPU ---
cpu_stats
cpu_temp
cpu_mhz

# --- Pamięć systemowa ---
ram

# --- Klatki na sekundę i czas klatki ---
fps
frametime
frame_timing=1

# --- Dodatkowe informacje ---
# Pokaż nazwę aplikacji/gry w nagłówku nakładki
wine
# Pokaż czas aktualny (format 24h)
time
time_format=%H:%M

# --- Progi wydajności fps (kolor zmienia się poniżej progu) ---
fps_color_change
fps_limit_method=late
# Poniżej tej wartości fps zmienia kolor na żółty/czerwony
fps_value=30,60

# --- Opcje zaawansowane (domyślnie wyłączone) ---
# Odkomentuj żeby włączyć wykresy historii
#fps_sampling_period=500
#histogram

# --- Skróty klawiszowe ---
# Przełącz widoczność nakładki: shift_l+F12 (domyślny MangoHud)
# toggle_hud=Shift_L+F12

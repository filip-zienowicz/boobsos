# gamemode.ini — domyślna konfiguracja GameMode dla BoobsOS Gaming Edition
# Dokumentacja: https://github.com/FeralInteractive/gamemode#configuration
#
# GameMode optymalizuje system podczas uruchamiania gier (CPU governor, nice, scheduler).
# Plik /etc/gamemode.ini ustawia wartości globalne; użytkownik może nadpisać
# swoim ~/.config/gamemode.ini (lub $XDG_CONFIG_HOME/gamemode.ini).
#
# Aby korzystać z GameMode, uruchamiaj gry przez:
#   gamemoderun %command%   (np. w opcjach uruchamiania Steam)

[general]
# Priorytet procesu gry (renice). Zakres: -20 (najwyższy) do 19 (najniższy).
# 10 = wyraźne pierwszeństwo dla gry bez destabilizacji systemu.
renice=10

# Scheduler I/O — priorytet w klasie best-effort (1=najwyższy, 7=najniższy)
# ionice=1

# Governor CPU aktywowany podczas sesji gry.
# "performance" = stałe maksymalne taktowanie; "schedutil" = domyślne adaptacyjne.
desiredgov=performance

# Governor przywracany po zakończeniu gry.
defaultgov=schedutil

# Limit czasu bezczynności (ms) po którym GameMode wyłącza optymalizacje
# gdy klient przestaje odpowiadać (np. crash). 0 = wyłączone.
softrealtime=auto

# Polityka schedulera: SCHED_RR wymaga uprawnień lub CAP_SYS_NICE
# reaper_freq=5

[filter]
# Opcjonalna lista procesów ZAWSZE zarządzanych przez GameMode (nawet bez gamemoderun)
# whitelist=

# Opcjonalna lista procesów NIGDY nie zarządzanych przez GameMode
# blacklist=

[gpu]
# UWAGA: Optymalizacje GPU są zaawansowane i mogą być niestabilne.
# Pozostawione wyłączone. Odkomentuj i ustaw apply_gpu_optimisations=accept-responsibility
# żeby włączyć (odpowiedzialność po stronie użytkownika).
#
# apply_gpu_optimisations=accept-responsibility
#
# Dla kart NVIDIA (nv_core/nv_mem w MHz, nv_powermizer_mode: 1=adaptive 3=max_perf):
# nv_powermizer_mode=1
#
# Dla kart AMD (amdgpu_performance_level: auto/low/high/manual):
# amdgpu_performance_level=auto

[cpu]
# Wyłączenie zarządzania energią CPU rdzeni (Park/Unpark) podczas gry.
# park_cores=no
# pin_cores=yes

[supervisor]
# Identyfikator procesu-opiekuna (np. Steam, Lutris) który może zarządzać GameMode
# supervisor_whitelist=steam,lutris,heroic
